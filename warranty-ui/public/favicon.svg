<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Shield background -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#863bff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6a2bcc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield shape -->
  <path d="M32 6C32 6 16 14 16 28C16 42 32 56 32 56C32 56 48 42 48 28C48 14 32 6 32 6Z" 
        fill="url(#shieldGradient)" 
        stroke="#5a1bbc" 
        stroke-width="1.5"/>
  
  <!-- Checkmark inside -->
  <g transform="translate(32, 32)">
    <!-- Check mark path -->
    <path d="M -6 -2 L -2 2 L 8 -8" 
          stroke="white" 
          stroke-width="3.5" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
  </g>
</svg>